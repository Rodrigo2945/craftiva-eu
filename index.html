<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Craftiva.eu — Marketplace B2B de Artesãos Europeus Verificados</title>
    <meta name="title" content="Craftiva.eu — European Artisan B2B Marketplace">
    <meta name="description" content="Conecte-se com produtores artesanais verificados em toda a Europa. Cerâmica, têxteis, madeira e mais. Marketplace B2B grossista com origem europeia garantida.">
    <meta name="keywords" content="artesãos europeus, b2b marketplace, fornecedores verificados, produtos artesanais, grossista cerâmica, têxteis portugal, madeira artesanal">
    <meta name="author" content="Craftiva.eu">
    <meta name="robots" content="index, follow">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://craftiva.eu">
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://craftiva.eu">
    <meta property="og:title" content="Craftiva.eu — European Artisan B2B Marketplace">
    <meta property="og:description" content="Verified European artisans. Quality handcrafted products for businesses. Ceramics, textiles, woodwork & more.">
    <meta property="og:image" content="https://craftiva.eu/og-image.jpg">
    <meta property="og:locale" content="pt_PT">
    <meta property="og:locale:alternate" content="en_GB">
    <meta property="og:locale:alternate" content="es_ES">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://craftiva.eu">
    <meta property="twitter:title" content="Craftiva.eu — European Artisan Marketplace">
    <meta property="twitter:description" content="Verified European artisans. Quality, authenticity, direct sourcing.">
    <meta property="twitter:image" content="https://craftiva.eu/og-image.jpg">
    
    <!-- Schema.org Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Craftiva.eu",
      "alternateName": "Craftiva European Artisan Marketplace",
      "url": "https://craftiva.eu",
      "description": "B2B marketplace connecting verified European artisans with businesses",
      "inLanguage": ["pt-PT", "en-GB", "es-ES"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://craftiva.eu/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Craftiva.eu",
        "url": "https://craftiva.eu",
        "logo": {
          "@type": "ImageObject",
          "url": "https://craftiva.eu/logo.png"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
